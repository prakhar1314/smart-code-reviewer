- id: clean-001-dataclass-with-types
  slice: clean
  language: python
  code: |
    from dataclasses import dataclass
    from decimal import Decimal

    @dataclass(frozen=True)
    class Money:
        amount: Decimal
        currency: str

        def __add__(self, other: "Money") -> "Money":
            if self.currency != other.currency:
                raise ValueError(f"cannot add {self.currency} to {other.currency}")
            return Money(self.amount + other.amount, self.currency)
  expected:
    scores:
      readability: { min: 4, max: 5 }
      structure: { min: 4, max: 5 }
      maintainability: { min: 4, max: 5 }
    must_be_ready: true

- id: clean-002-context-manager
  slice: clean
  language: python
  code: |
    from contextlib import contextmanager
    import time
    import logging

    logger = logging.getLogger(__name__)

    @contextmanager
    def timed(label: str):
        start = time.perf_counter()
        try:
            yield
        finally:
            elapsed_ms = (time.perf_counter() - start) * 1000
            logger.info("%s took %.1fms", label, elapsed_ms)
  expected:
    scores:
      readability: { min: 4, max: 5 }
      structure: { min: 4, max: 5 }
      maintainability: { min: 4, max: 5 }
    must_be_ready: true

- id: clean-003-typed-handler
  slice: clean
  language: python
  code: |
    from typing import Protocol

    class UserStore(Protocol):
        def get(self, user_id: str) -> dict | None: ...

    class NotFoundError(Exception):
        pass

    def get_user_email(store: UserStore, user_id: str) -> str:
        user = store.get(user_id)
        if user is None:
            raise NotFoundError(f"user {user_id} not found")
        return user["email"]
  expected:
    scores:
      readability: { min: 4, max: 5 }
      structure: { min: 4, max: 5 }
      maintainability: { min: 4, max: 5 }
    must_be_ready: true

