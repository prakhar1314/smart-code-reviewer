- id: sec-001-sql-injection-concat
  slice: security
  language: python
  code: |
    import sqlite3
    def get_user(user_id):
        conn = sqlite3.connect("app.db")
        cur = conn.cursor()
        cur.execute("SELECT * FROM users WHERE id = " + str(user_id))
        return cur.fetchall()
  expected:
    must_be_ready: false
    must_include_blocker: true
    must_flag_categories: [security]
    notes: "SQL injection via string concatenation."

- id: sec-002-sql-injection-fstring
  slice: security
  language: python
  code: |
    def login(user, pwd):
        import sqlite3
        conn = sqlite3.connect("app.db")
        cur = conn.cursor()
        cur.execute(f"SELECT * FROM users WHERE name='{user}' AND pass='{pwd}'")
        return cur.fetchone() is not None
  expected:
    must_be_ready: false
    must_include_blocker: true
    must_flag_categories: [security]
    notes: "SQL injection via f-string interpolation."

