- id: style-002-god-function
  slice: style
  language: python
  code: |
    def process(data):
        # parse
        rows = []
        for line in data.split("\n"):
            parts = line.split(",")
            rows.append({"id": parts[0], "name": parts[1], "amount": float(parts[2])})
        # filter
        rows = [r for r in rows if r["amount"] > 0]
        # transform
        for r in rows:
            r["fee"] = r["amount"] * 0.03
            r["total"] = r["amount"] + r["fee"]
        # sort
        rows.sort(key=lambda r: r["total"], reverse=True)
        # serialize
        result = ""
        for r in rows:
            result += f"{r['id']},{r['name']},{r['total']}\n"
        return result
  expected:
    scores:
      structure: { min: 1, max: 3 }
      maintainability: { min: 1, max: 3 }
    must_flag_categories: [structure, maintainability]
    must_be_ready: true
    must_include_blocker: false
