# Smart Code Reviewer — Golden Set
# 25 curated snippets across 4 slices, used by run_eval.py to regression-test
# prompt changes. Each item has an expected outcome the reviewer should produce.
#
# Slices:
#   bug-fix     — paired buggy / fixed code. The buggy version should score
#                 low and flag the issue; the fix should score high and clean.
#   security    — security-blocker code. Should set ready_for_human_review=false.
#   clean       — idiomatic reference code. Should score 4+ across all dims.
#   style       — stylistic anti-patterns. Mid scores, no blockers.

# =====================================================================
# SLICE 1: BUG/FIX PAIRS  (14 items / 7 pairs)
# =====================================================================

